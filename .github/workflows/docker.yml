name: Docker Build & Push

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker.yml'
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Frontend
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: false
        tags: my-web-app-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Build Backend
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: false
        tags: my-web-app-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
